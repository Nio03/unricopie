name: Validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Chequeo rápido de los YAML (mensajes claros para quien contribuye).
      - run: npm run validate-data
      # Validación completa del esquema Zod vía build.
      - run: npm run build
