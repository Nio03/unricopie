name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Re-publica cuando el refresco de stats termina (el push del bot no
  # dispara workflows por sí solo).
  workflow_run:
    workflows: ["Refresh GitHub stats"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

# Una sola publicación a la vez; no cancela una en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build con Astro
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
