name: Project '06 (Sonic P-06)
category: fan-remake
console: x360
status: playable
author: Ian 'ChaosX' Moris
originalDeveloper: Sonic Team / Sega
engine: Unity
desc:
  es: "Remake desde cero en Unity de Sonic the Hedgehog (2006): arregla bugs del original, restaura contenido cortado y añade mejoras, en builds episódicos. Es un remake de fans, no un recomp ni decomp. Proyecto en solitario de ChaosX — distinto del port cancelado de Gistix/Mefiresu."
  en: "From-scratch Unity remake of Sonic the Hedgehog (2006): fixes the original's bugs, restores cut content and adds features, in episodic builds. A fan remake, not a recomp or decomp. ChaosX's solo project — distinct from the cancelled Gistix/Mefiresu port."
requirements:
  es: "Nada: es un remake completo en Unity. Descárgalo y juega."
  en: "Nothing: it's a complete Unity remake. Just download and play."
